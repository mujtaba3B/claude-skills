# CodeRabbit configuration. Schema: https://coderabbit.ai/integrations/schema.v2.json
# Docs: https://docs.coderabbit.ai/reference/configuration
# Generated by the coderabbit-config skill. Edit freely.

language: "en-US"

# Voice rules lifted from CLAUDE.md: no em-dashes, direct/terse, match existing conventions.
tone_instructions: "Direct, terse feedback. Never use em-dashes (U+2014); flag any in prose, comments, or copy. Match existing repo conventions over inventing parallel ones."

early_access: false

reviews:
  profile: "chill"

  request_changes_workflow: false

  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: true
  sequence_diagrams: false
  assess_linked_issues: true
  suggested_reviewers: true
  auto_apply_labels: false

  path_filters:
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/*.lock"
    - "!**/*.min.js"
    - "!**/*.min.css"
    - "!**/__pycache__/**"
    - "!**/coverage/**"
    - "!**/.next/**"
    - "!**/.nuxt/**"
    - "!**/vendor/**"
    - "!LOG.md"
    - "!INDEX.md"

  path_instructions:
    - path: "**/*"
      instructions: "Flag any em-dash character (U+2014) in prose, comments, commit-style copy, or doc strings. Suggest a period, comma, colon, semicolon, parentheses, or hyphen instead."
    - path: "skills/**/SKILL.md"
      instructions: "SKILL.md frontmatter must include name (matching the directory) and description (the trigger blurb Claude sees). The description is load-bearing: concrete trigger phrases beat abstract descriptions. Flag vague descriptions and missing/mismatched name fields."
    - path: "harness/*/install.sh"
      instructions: "Harness mod installers must be idempotent, back up ~/.claude/settings.json before mutating, validate JSON after merge, and prefix each merged hook command with the sentinel ': mutwo:<mod>;' so uninstall is location-independent. Flag installers that skip backup, skip validation, or stuff the sentinel into the matcher field instead of the command."
    - path: "harness/*/uninstall.sh"
      instructions: "Uninstall must grep the sentinel ': mutwo:<mod>;' inside the command string, not the matcher. Flag uninstall logic that keys off matcher or off file location."
    - path: "**/*.sh"
      instructions: "Shell scripts should set -euo pipefail (or document why not), quote variables, and avoid relying on a populated PATH. The Claude Code Bash tool strips PATH; prefer absolute paths for non-coreutil binaries or prepend the install dir explicitly."
    - path: "skills/**/SKILL.md"
      instructions: "If a skill grows shared dependencies with sibling skills, flag it: that is the signal to move it to gstack-extensions/plugins/ instead of keeping it in this standalone-skills repo."

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "main"

  tools:
    github-checks:
      enabled: true
      timeout_ms: 90000
    shellcheck:
      enabled: true
    markdownlint:
      enabled: true
    yamllint:
      enabled: true
    gitleaks:
      enabled: true

  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: false

chat:
  auto_reply: true

knowledge_base:
  opt_out: false
  learnings:
    scope: "auto"
  issues:
    scope: "auto"
  pull_requests:
    scope: "auto"
  code_guidelines:
    enabled: true
    filePatterns:
      - "CLAUDE.md"
      - "**/CLAUDE.md"
      - "README.md"
